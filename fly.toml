# fly.toml app configuration file generated for nba-standings-bot on 2026-03-19T23:48:58-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'nba-standings-bot'
primary_region = 'dfw'

[build]

[env]
RUST_LOG = 'info'

# No [http_service] — this is a long-running Discord bot, not an HTTP server.
# The [deploy] section ensures the machine stays running continuously.

[deploy]
auto_stop_machines = false
auto_start_machines = false
min_machines_count = 1

[[vm]]
memory = '256mb'
cpus = 1
